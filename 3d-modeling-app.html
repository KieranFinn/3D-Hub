<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 建模与骨架绑定应用</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        :root {
            --c-bg: #f8fafc;
            --c-canvas: #ffffff;
            --c-border: #cbd5e1;
            --c-text-main: #0f172a;
            --c-text-sub: #64748b;
            --c-accent: #3b82f6;
            --font-ui: system-ui, -apple-system, 'Segoe UI', sans-serif;
            --font-mono: 'SF Mono', Monaco, Consolas, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--c-bg);
            font-family: var(--font-ui);
            color: var(--c-text-main);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--c-canvas);
            border-right: 1px solid var(--c-border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--c-border);
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
        }

        .sidebar-subtitle {
            font-size: 11px;
            color: var(--c-text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--c-text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--c-border);
        }

        /* 按钮样式 */
        .btn {
            display: block;
            width: 100%;
            padding: 10px 16px;
            margin-bottom: 8px;
            background: var(--c-canvas);
            border: 1px solid var(--c-border);
            font-family: var(--font-ui);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--c-bg);
            border-color: var(--c-text-sub);
        }

        .btn--primary {
            background: var(--c-text-main);
            color: var(--c-canvas);
            border-color: var(--c-text-main);
        }

        .btn--primary:hover {
            background: var(--c-text-sub);
            border-color: var(--c-text-sub);
        }

        .btn--active {
            background: var(--c-accent);
            color: var(--c-canvas);
            border-color: var(--c-accent);
        }

        /* 属性面板 */
        .property-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--c-border);
        }

        .property-label {
            font-size: 12px;
            color: var(--c-text-sub);
        }

        .property-value {
            font-family: var(--font-mono);
            font-size: 12px;
        }

        input[type="range"] {
            width: 100%;
            margin: 8px 0;
        }

        input[type="number"] {
            width: 60px;
            padding: 4px 8px;
            border: 1px solid var(--c-border);
            font-family: var(--font-mono);
            font-size: 12px;
        }

        /* 主视图区 */
        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            height: 48px;
            background: var(--c-canvas);
            border-bottom: 1px solid var(--c-border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
        }

        .toolbar-btn {
            padding: 6px 12px;
            background: var(--c-canvas);
            border: 1px solid var(--c-border);
            font-size: 12px;
            cursor: pointer;
        }

        .toolbar-btn:hover {
            background: var(--c-bg);
        }

        .toolbar-btn--active {
            background: var(--c-text-main);
            color: var(--c-canvas);
        }

        .toolbar-separator {
            width: 1px;
            height: 24px;
            background: var(--c-border);
            margin: 0 8px;
        }

        /* 3D画布 */
        .canvas-container {
            flex: 1;
            position: relative;
            background: #1a1a2e;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 信息覆盖层 */
        .info-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(15, 23, 42, 0.9);
            color: var(--c-canvas);
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 11px;
            line-height: 1.6;
        }

        .info-row {
            display: flex;
            gap: 16px;
        }

        .info-label {
            color: var(--c-text-sub);
            width: 60px;
        }

        /* 骨架层级树 */
        .bone-tree {
            font-family: var(--font-mono);
            font-size: 12px;
        }

        .bone-item {
            padding: 4px 0;
            padding-left: 16px;
            cursor: pointer;
        }

        .bone-item:hover {
            background: var(--c-bg);
        }

        .bone-item--selected {
            background: var(--c-accent);
            color: var(--c-canvas);
        }

        .bone-toggle {
            display: inline-block;
            width: 12px;
            cursor: pointer;
        }

        /* 状态栏 */
        .status-bar {
            height: 28px;
            background: var(--c-canvas);
            border-top: 1px solid var(--c-border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 11px;
            color: var(--c-text-sub);
        }

        .status-item {
            margin-right: 24px;
        }

        /* 文件输入隐藏 */
        #fileInput {
            display: none;
        }

        /* 颜色选择器 */
        .color-picker {
            width: 40px;
            height: 24px;
            border: 1px solid var(--c-border);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">3D 建模工作室</div>
                <div class="sidebar-subtitle">Skeleton Rigging System</div>
            </div>
            
            <div class="sidebar-content">
                <!-- 文件操作 -->
                <div class="section">
                    <div class="section-title">文件</div>
                    <button class="btn btn--primary" onclick="createNewModel()">新建模型</button>
                    <button class="btn" onclick="document.getElementById('fileInput').click()">导入模型</button>
                    <input type="file" id="fileInput" accept=".gltf,.glb,.obj" onchange="importModel(event)">
                    <button class="btn" onclick="exportModel()">导出模型</button>
                </div>

                <!-- 基础几何体 -->
                <div class="section">
                    <div class="section-title">基础几何体</div>
                    <button class="btn" onclick="addPrimitive('cube')">立方体</button>
                    <button class="btn" onclick="addPrimitive('sphere')">球体</button>
                    <button class="btn" onclick="addPrimitive('cylinder')">圆柱体</button>
                    <button class="btn" onclick="addPrimitive('cone')">圆锥体</button>
                </div>

                <!-- 骨架工具 -->
                <div class="section">
                    <div class="section-title">骨架工具</div>
                    <button class="btn" id="btnCreateSkeleton" onclick="toggleSkeletonMode()">创建骨架</button>
                    <button class="btn" onclick="addBone()">添加骨骼</button>
                    <button class="btn" onclick="bindSkin()">绑定蒙皮</button>
                    <button class="btn" onclick="toggleSkeletonVisibility()">显示/隐藏骨架</button>
                </div>

                <!-- 骨架层级 -->
                <div class="section">
                    <div class="section-title">骨架层级</div>
                    <div class="bone-tree" id="boneTree">
                        <div class="bone-item">
                            <span class="bone-toggle">▼</span>
                            Root
                        </div>
                    </div>
                </div>

                <!-- 变换属性 -->
                <div class="section">
                    <div class="section-title">变换</div>
                    <div class="property-row">
                        <span class="property-label">位置 X</span>
                        <input type="number" id="posX" value="0" step="0.1" onchange="updateTransform()">
                    </div>
                    <div class="property-row">
                        <span class="property-label">位置 Y</span>
                        <input type="number" id="posY" value="0" step="0.1" onchange="updateTransform()">
                    </div>
                    <div class="property-row">
                        <span class="property-label">位置 Z</span>
                        <input type="number" id="posZ" value="0" step="0.1" onchange="updateTransform()">
                    </div>
                    <div class="property-row">
                        <span class="property-label">旋转 X</span>
                        <input type="number" id="rotX" value="0" step="1" onchange="updateTransform()">
                    </div>
                    <div class="property-row">
                        <span class="property-label">旋转 Y</span>
                        <input type="number" id="rotY" value="0" step="1" onchange="updateTransform()">
                    </div>
                    <div class="property-row">
                        <span class="property-label">旋转 Z</span>
                        <input type="number" id="rotZ" value="0" step="1" onchange="updateTransform()">
                    </div>
                    <div class="property-row">
                        <span class="property-label">缩放</span>
                        <input type="number" id="scale" value="1" step="0.1" onchange="updateTransform()">
                    </div>
                </div>

                <!-- 材质 -->
                <div class="section">
                    <div class="section-title">材质</div>
                    <div class="property-row">
                        <span class="property-label">颜色</span>
                        <input type="color" class="color-picker" id="materialColor" value="#3b82f6" onchange="updateMaterial()">
                    </div>
                    <div class="property-row">
                        <span class="property-label">线框模式</span>
                        <input type="checkbox" id="wireframe" onchange="updateMaterial()">
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主视图 -->
        <main class="main-view">
            <!-- 工具栏 -->
            <div class="toolbar">
                <button class="toolbar-btn toolbar-btn--active" id="btnSelect" onclick="setTool('select')">选择</button>
                <button class="toolbar-btn" id="btnMove" onclick="setTool('move')">移动</button>
                <button class="toolbar-btn" id="btnRotate" onclick="setTool('rotate')">旋转</button>
                <button class="toolbar-btn" id="btnScale" onclick="setTool('scale')">缩放</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="setView('front')">前视图</button>
                <button class="toolbar-btn" onclick="setView('top')">顶视图</button>
                <button class="toolbar-btn" onclick="setView('side')">侧视图</button>
                <button class="toolbar-btn" onclick="setView('perspective')">透视图</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="toggleGrid()">网格</button>
                <button class="toolbar-btn" onclick="toggleAxes()">坐标轴</button>
            </div>

            <!-- 3D画布 -->
            <div class="canvas-container">
                <canvas id="canvas3d"></canvas>
                <div class="info-overlay">
                    <div class="info-row">
                        <span class="info-label">顶点:</span>
                        <span id="vertexCount">0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">面数:</span>
                        <span id="faceCount">0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">骨骼:</span>
                        <span id="boneCount">0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">对象:</span>
                        <span id="objectName">None</span>
                    </div>
                </div>
            </div>

            <!-- 状态栏 -->
            <div class="status-bar">
                <span class="status-item">就绪</span>
                <span class="status-item" id="coordDisplay">X: 0.00 Y: 0.00 Z: 0.00</span>
                <span class="status-item">FPS: <span id="fps">60</span></span>
            </div>
        </main>
    </div>

    <script>
        // ============================================
        // 3D 建模应用核心代码
        // ============================================

        // 全局变量
        let scene, camera, renderer, controls;
        let selectedObject = null;
        let skeleton = null;
        let skeletonMode = false;
        let bones = [];
        let currentTool = 'select';
        let gridHelper, axesHelper;
        let animationId;
        let raycaster, mouse;

        // 初始化
        function init() {
            const canvas = document.getElementById('canvas3d');
            const container = canvas.parentElement;

            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            // 相机
            camera = new THREE.PerspectiveCamera(
                45,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(10, 10, 10);
            camera.lookAt(0, 0, 0);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;

            // 控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // 光照
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // 网格
            gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
            scene.add(gridHelper);

            // 坐标轴
            axesHelper = new THREE.AxesHelper(2);
            scene.add(axesHelper);

            // 射线检测
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // 事件监听
            canvas.addEventListener('click', onCanvasClick);
            canvas.addEventListener('mousemove', onCanvasMouseMove);
            window.addEventListener('resize', onWindowResize);

            // 开始渲染循环
            animate();

            // 创建默认模型
            createNewModel();
        }

        // 渲染循环
        function animate() {
            animationId = requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            
            // 更新FPS
            updateFPS();
        }

        // FPS计数器
        let frameCount = 0;
        let lastTime = performance.now();
        function updateFPS() {
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
        }

        // 窗口大小调整
        function onWindowResize() {
            const canvas = document.getElementById('canvas3d');
            const container = canvas.parentElement;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // 画布点击事件
        function onCanvasClick(event) {
            const canvas = document.getElementById('canvas3d');
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (object.type === 'Mesh' || object.type === 'SkinnedMesh') {
                    selectObject(object);
                }
            }
        }

        // 鼠标移动事件
        function onCanvasMouseMove(event) {
            const canvas = document.getElementById('canvas3d');
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                document.getElementById('coordDisplay').textContent = 
                    `X: ${point.x.toFixed(2)} Y: ${point.y.toFixed(2)} Z: ${point.z.toFixed(2)}`;
            }
        }

        // 选择对象
        function selectObject(object) {
            // 取消之前的选择
            if (selectedObject && selectedObject.material && selectedObject.material.emissive) {
                selectedObject.material.emissive.setHex(0x000000);
            }

            selectedObject = object;

            // 高亮选中的对象
            if (selectedObject.material) {
                if (!selectedObject.material.emissive) {
                    selectedObject.material = selectedObject.material.clone();
                }
                selectedObject.material.emissive.setHex(0x222222);
            }

            // 更新属性面板
            updatePropertyPanel();
            updateInfoOverlay();
        }

        // 更新属性面板
        function updatePropertyPanel() {
            if (!selectedObject) return;

            document.getElementById('posX').value = selectedObject.position.x.toFixed(2);
            document.getElementById('posY').value = selectedObject.position.y.toFixed(2);
            document.getElementById('posZ').value = selectedObject.position.z.toFixed(2);
            
            document.getElementById('rotX').value = (selectedObject.rotation.x * 180 / Math.PI).toFixed(0);
            document.getElementById('rotY').value = (selectedObject.rotation.y * 180 / Math.PI).toFixed(0);
            document.getElementById('rotZ').value = (selectedObject.rotation.z * 180 / Math.PI).toFixed(0);
            
            document.getElementById('scale').value = selectedObject.scale.x.toFixed(2);
        }

        // 更新变换
        function updateTransform() {
            if (!selectedObject) return;

            selectedObject.position.set(
                parseFloat(document.getElementById('posX').value),
                parseFloat(document.getElementById('posY').value),
                parseFloat(document.getElementById('posZ').value)
            );

            selectedObject.rotation.set(
                parseFloat(document.getElementById('rotX').value) * Math.PI / 180,
                parseFloat(document.getElementById('rotY').value) * Math.PI / 180,
                parseFloat(document.getElementById('rotZ').value) * Math.PI / 180
            );

            const scale = parseFloat(document.getElementById('scale').value);
            selectedObject.scale.set(scale, scale, scale);
        }

        // 更新材质
        function updateMaterial() {
            if (!selectedObject) return;

            const color = document.getElementById('materialColor').value;
            const wireframe = document.getElementById('wireframe').checked;

            if (selectedObject.material) {
                selectedObject.material.color.set(color);
                selectedObject.material.wireframe = wireframe;
            }
        }

        // 更新信息覆盖层
        function updateInfoOverlay() {
            if (!selectedObject) {
                document.getElementById('vertexCount').textContent = '0';
                document.getElementById('faceCount').textContent = '0';
                document.getElementById('objectName').textContent = 'None';
                return;
            }

            const geometry = selectedObject.geometry;
            if (geometry) {
                document.getElementById('vertexCount').textContent = geometry.attributes.position.count;
                document.getElementById('faceCount').textContent = geometry.index ? 
                    geometry.index.count / 3 : geometry.attributes.position.count / 3;
            }
            document.getElementById('objectName').textContent = selectedObject.name || 'Unnamed';
            document.getElementById('boneCount').textContent = bones.length;
        }

        // 创建新模型
        function createNewModel() {
            // 清除现有模型
            const objectsToRemove = [];
            scene.traverse((child) => {
                if (child.type === 'Mesh' || child.type === 'SkinnedMesh') {
                    objectsToRemove.push(child);
                }
            });
            objectsToRemove.forEach(obj => scene.remove(obj));

            // 创建默认立方体
            addPrimitive('cube');
            
            bones = [];
            updateBoneTree();
            updateInfoOverlay();
        }

        // 添加基础几何体
        function addPrimitive(type) {
            let geometry;
            switch (type) {
                case 'cube':
                    geometry = new THREE.BoxGeometry(2, 2, 2);
                    break;
                case 'sphere':
                    geometry = new THREE.SphereGeometry(1, 32, 32);
                    break;
                case 'cylinder':
                    geometry = new THREE.CylinderGeometry(1, 1, 2, 32);
                    break;
                case 'cone':
                    geometry = new THREE.ConeGeometry(1, 2, 32);
                    break;
            }

            const material = new THREE.MeshPhongMaterial({ 
                color: 0x3b82f6,
                flatShading: false
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.name = type + '_' + Date.now();
            
            scene.add(mesh);
            selectObject(mesh);
        }

        // 导入模型
        function importModel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const loader = new THREE.GLTFLoader();
            const url = URL.createObjectURL(file);

            loader.load(url, (gltf) => {
                const model = gltf.scene;
                scene.add(model);
                
                // 调整模型位置
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);

                // 查找第一个mesh并选中
                model.traverse((child) => {
                    if (child.isMesh) {
                        selectObject(child);
                    }
                });

                URL.revokeObjectURL(url);
            }, undefined, (error) => {
                console.error('Error loading model:', error);
                alert('模型加载失败，请检查文件格式');
            });
        }

        // 导出模型
        function exportModel() {
            if (!selectedObject) {
                alert('请先选择一个对象');
                return;
            }
            alert('导出功能需要额外的导出库支持。当前选中: ' + selectedObject.name);
        }

        // 切换骨架模式
        function toggleSkeletonMode() {
            skeletonMode = !skeletonMode;
            const btn = document.getElementById('btnCreateSkeleton');
            if (skeletonMode) {
                btn.classList.add('btn--active');
                btn.textContent = '退出骨架模式';
            } else {
                btn.classList.remove('btn--active');
                btn.textContent = '创建骨架';
            }
        }

        // 添加骨骼
        function addBone() {
            if (!selectedObject) {
                alert('请先选择一个对象');
                return;
            }

            const bone = new THREE.Bone();
            bone.name = 'Bone_' + (bones.length + 1);
            bone.position.copy(selectedObject.position);
            
            if (bones.length > 0) {
                bones[bones.length - 1].add(bone);
            } else {
                scene.add(bone);
            }
            
            bones.push(bone);
            updateBoneTree();
            updateInfoOverlay();

            // 可视化骨骼
            const boneHelper = new THREE.Mesh(
                new THREE.SphereGeometry(0.1),
                new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            bone.add(boneHelper);
        }

        // 绑定蒙皮
        function bindSkin() {
            if (!selectedObject || bones.length === 0) {
                alert('请先选择对象并创建骨架');
                return;
            }

            // 创建骨架
            const skeletonRoot = new THREE.Skeleton(bones);
            
            // 将Mesh转换为SkinnedMesh
            const geometry = selectedObject.geometry;
            const material = selectedObject.material;
            const skinnedMesh = new THREE.SkinnedMesh(geometry, material);
            
            skinnedMesh.position.copy(selectedObject.position);
            skinnedMesh.rotation.copy(selectedObject.rotation);
            skinnedMesh.scale.copy(selectedObject.scale);
            skinnedMesh.bind(skeletonRoot);
            
            scene.remove(selectedObject);
            scene.add(skinnedMesh);
            
            // 添加骨骼到场景以便显示
            const rootBone = bones[0];
            while (rootBone.parent && rootBone.parent.type === 'Bone') {
                rootBone = rootBone.parent;
            }
            scene.add(rootBone);
            
            selectObject(skinnedMesh);
            alert('蒙皮绑定完成');
        }

        // 切换骨架显示
        function toggleSkeletonVisibility() {
            bones.forEach(bone => {
                bone.traverse((child) => {
                    if (child.type === 'Mesh') {
                        child.visible = !child.visible;
                    }
                });
            });
        }

        // 更新骨骼树显示
        function updateBoneTree() {
            const tree = document.getElementById('boneTree');
            if (bones.length === 0) {
                tree.innerHTML = '<div class="bone-item"><span class="bone-toggle">-</span>无骨骼</div>';
                return;
            }

            let html = '';
            bones.forEach((bone, index) => {
                const indent = '  '.repeat(getBoneDepth(bone));
                html += `<div class="bone-item" onclick="selectBone(${index})">${indent}<span class="bone-toggle">-</span>${bone.name}</div>`;
            });
            tree.innerHTML = html;
        }

        // 获取骨骼深度
        function getBoneDepth(bone) {
            let depth = 0;
            let parent = bone.parent;
            while (parent && parent.type === 'Bone') {
                depth++;
                parent = parent.parent;
            }
            return depth;
        }

        // 选择骨骼
        function selectBone(index) {
            if (bones[index]) {
                // 高亮选中的骨骼
                document.querySelectorAll('.bone-item').forEach((item, i) => {
                    if (i === index) {
                        item.classList.add('bone-item--selected');
                    } else {
                        item.classList.remove('bone-item--selected');
                    }
                });
            }
        }

        // 设置工具
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.toolbar-btn').forEach(btn => {
                btn.classList.remove('toolbar-btn--active');
            });
            document.getElementById('btn' + tool.charAt(0).toUpperCase() + tool.slice(1)).classList.add('toolbar-btn--active');
        }

        // 设置视图
        function setView(view) {
            switch (view) {
                case 'front':
                    camera.position.set(0, 0, 10);
                    break;
                case 'top':
                    camera.position.set(0, 10, 0);
                    break;
                case 'side':
                    camera.position.set(10, 0, 0);
                    break;
                case 'perspective':
                    camera.position.set(10, 10, 10);
                    break;
            }
            camera.lookAt(0, 0, 0);
            controls.update();
        }

        // 切换网格
        function toggleGrid() {
            gridHelper.visible = !gridHelper.visible;
        }

        // 切换坐标轴
        function toggleAxes() {
            axesHelper.visible = !axesHelper.visible;
        }

        // 启动应用
        window.onload = init;
    </script>
</body>
</html>
