<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hub - AI Character Creation Studio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- ========== 左侧：主舞台 ========== -->
        <div class="stage">
            <!-- 舞台状态块 -->
            <div class="stage-status">
                <div class="status-brand">
                    <h1>3D Hub</h1>
                    <span class="status-mode">AI Character Studio</span>
                </div>
                <div class="status-info">
                    <span class="status-dot active"></span>
                    <span>Ready</span>
                </div>
            </div>
            
            <!-- 3D Canvas -->
            <div class="stage-canvas" id="canvas-container">
                <div class="loading" id="loading">初始化中...</div>
            </div>
            
            <!-- 舞台底部提示 -->
            <div class="stage-footer">
                <span>✦ Drag to rotate</span>
                <span class="divider">|</span>
                <span>✦ Scroll to zoom</span>
            </div>
            
            <!-- ========== 悬浮控制台（覆盖在舞台上）========== -->
            <div class="floating-console">
                <!-- 控制台头部 -->
                <div class="console-head">
                    <span class="section-label">CREATE</span>
                </div>
                
                <!-- 1. 描述输入 -->
                <div class="console-block">
                    <div class="block-label">
                        <span class="num">01</span>
                        <span>描述</span>
                    </div>
                    <textarea id="characterPrompt" placeholder="描述你的角色，如：少年感，银发..."></textarea>
                    <button class="btn-primary" id="generateBtn">✨ 应用描述</button>
                </div>
                
                <!-- 2. 风格预设 -->
                <div class="console-block">
                    <div class="block-label">
                        <span class="num">02</span>
                        <span>风格</span>
                    </div>
                    <div class="preset-row">
                        <button class="preset-btn" data-preset="young">少年感</button>
                        <button class="preset-btn" data-preset="mature">成熟感</button>
                        <button class="preset-btn" data-preset="cute">可爱</button>
                        <button class="preset-btn" data-preset="cool">冷艳</button>
                    </div>
                </div>
                
                <!-- 3. 细节调节 -->
                <div class="console-block sliders-block">
                    <div class="block-label">
                        <span class="num">03</span>
                        <span>调节</span>
                    </div>
                    
                    <div class="slider-group">
                        <div class="slider-item">
                            <span>眼睛</span>
                            <input type="range" id="eyeSize" min="0.5" max="2.5" step="0.1" value="1.0">
                        </div>
                        <div class="slider-item">
                            <span>间距</span>
                            <input type="range" id="eyeSpacing" min="0.5" max="1.5" step="0.1" value="1.0">
                        </div>
                    </div>
                    
                    <div class="slider-group">
                        <div class="slider-item">
                            <span>鼻子</span>
                            <input type="range" id="noseSize" min="0.5" max="2.0" step="0.1" value="1.0">
                        </div>
                        <div class="slider-item">
                            <span>嘴巴</span>
                            <input type="range" id="mouthWidth" min="0.5" max="2.0" step="0.1" value="1.0">
                        </div>
                    </div>
                    
                    <div class="slider-group">
                        <div class="slider-item">
                            <span>头部</span>
                            <input type="range" id="headSize" min="0.8" max="1.5" step="0.1" value="1.0">
                        </div>
                    </div>
                </div>
                
                <!-- 4. 操作按钮 -->
                <div class="console-actions">
                    <button class="btn-action" id="saveBtn">💾 保存</button>
                    <button class="btn-action secondary" id="resetBtn">🔄 重置</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
