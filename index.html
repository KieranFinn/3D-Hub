<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hub - 角色创建实验室</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div id="canvas-container">
            <div class="loading" id="loading">加载中...</div>
        </div>
        
        <div class="controls">
            <h1>🎮 3D Hub</h1>
            <p class="subtitle">AI 角色创建实验室</p>
            
            <!-- 文本描述输入 -->
            <div class="prompt-section">
                <h3>📝 角色描述</h3>
                <textarea id="characterPrompt" placeholder="描述角色特征，如：少年感、可爱、冷酷..."></textarea>
                <button class="generate-btn" id="generateBtn">✨ 应用描述</button>
            </div>
            
            <!-- 风格预设 -->
            <div class="control-group">
                <h3>🎨 风格预设</h3>
                <div class="presets-section">
                    <button class="preset-btn" data-preset="young">少年感</button>
                    <button class="preset-btn" data-preset="mature">成熟感</button>
                    <button class="preset-btn" data-preset="cute">可爱系</button>
                    <button class="preset-btn" data-preset="cool">冷艳系</button>
                </div>
            </div>
            
            <!-- 眼部调节 -->
            <div class="control-group">
                <h3>👁 眼部特征</h3>
                <div class="slider-row">
                    <div class="slider-label">
                        <span>眼睛大小</span>
                        <span id="eyeSizeValue">1.0x</span>
                    </div>
                    <input type="range" id="eyeSize" min="0.5" max="2.5" step="0.1" value="1.0">
                </div>
                <div class="slider-row">
                    <div class="slider-label">
                        <span>眼睛间距</span>
                        <span id="eyeSpacingValue">1.0x</span>
                    </div>
                    <input type="range" id="eyeSpacing" min="0.5" max="1.5" step="0.1" value="1.0">
                </div>
            </div>
            
            <!-- 鼻部调节 -->
            <div class="control-group">
                <h3>👃 鼻部特征</h3>
                <div class="slider-row">
                    <div class="slider-label">
                        <span>鼻子大小</span>
                        <span id="noseSizeValue">1.0x</span>
                    </div>
                    <input type="range" id="noseSize" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
            </div>
            
            <!-- 嘴部调节 -->
            <div class="control-group">
                <h3>👄 嘴部特征</h3>
                <div class="slider-row">
                    <div class="slider-label">
                        <span>嘴巴宽度</span>
                        <span id="mouthWidthValue">1.0x</span>
                    </div>
                    <input type="range" id="mouthWidth" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
            </div>
            
            <!-- 脸部调节 -->
            <div class="control-group">
                <h3>🧑 脸部轮廓</h3>
                <div class="slider-row">
                    <div class="slider-label">
                        <span>头大小</span>
                        <span id="headSizeValue">1.0x</span>
                    </div>
                    <input type="range" id="headSize" min="0.8" max="1.5" step="0.1" value="1.0">
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button class="action-btn save-btn" id="saveBtn">💾 保存配置</button>
                <button class="action-btn reset-btn" id="resetBtn">🔄 重置</button>
            </div>
            
            <div class="status-bar">
                v1.1 - 模块化架构 | 文本描述功能已就绪
            </div>
        </div>
    </div>
    
    <!-- Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
